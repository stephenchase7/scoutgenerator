<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#c8102e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Scout Capture – NY Red Bulls</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --red:#c8102e; --red-dk:#9e0c24; --ink:#1f2933; --slate:#52606d;
    --mute:#9aa5b1; --line:#e4e7eb; --bg:#eef1f4; --card:#ffffff;
    --gold:#f5b301; --gold-off:#d2d6dc; --ok:#0b8457; --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased;}

  /* Header */
  .header{background:#fff;border-bottom:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;gap:10px;}
  .crest{width:32px;height:32px;border-radius:8px;background:var(--red);color:#fff;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;}
  .header h1{font-size:17px;letter-spacing:-.02em;}
  .header span{font-size:11px;color:var(--mute);display:block;margin-top:1px;}

  /* View tabs */
  .view-tabs{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin:12px 14px;background:#fff;}
  .view-tab{padding:12px;text-align:center;font-size:14px;font-weight:600;color:var(--slate);cursor:pointer;border:none;background:#fff;font-family:inherit;}
  .view-tab.on{background:var(--red);color:#fff;}

  /* Player tabs bar */
  .tabs-bar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--line);padding:10px 12px;display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .tabs-bar::-webkit-scrollbar{display:none;}
  .player-tab{flex:1 1 0;min-width:70px;max-width:160px;display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:10px;background:var(--bg);border:2px solid transparent;cursor:pointer;transition:.15s;position:relative;}
  .player-tab:hover{border-color:var(--mute);}
  .player-tab.active{background:#fff;border-color:var(--red);box-shadow:0 2px 8px rgba(0,0,0,.08);}
  .player-tab .jersey{flex-shrink:0;width:28px;height:28px;border-radius:8px;background:var(--slate);color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;}
  .player-tab.active .jersey{background:var(--red);}
  .player-tab .info{flex:1;min-width:0;text-align:left;}
  .player-tab .pos{font-size:9px;color:var(--mute);font-weight:600;}
  .player-tab .tname{font-size:11px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .player-tab .badge{flex-shrink:0;width:6px;height:6px;border-radius:50%;background:var(--gold);}
  .player-tab .badge.empty{background:var(--line);}
  .player-tab .badge.saved{background:var(--ok);}
  .player-tab .del-btn{position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:#e53935;color:#fff;border:2px solid #fff;font-size:11px;font-weight:700;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 2px 4px rgba(0,0,0,.2);}
  .player-tab:hover .del-btn,.player-tab.active .del-btn{display:flex;}
  .add-tab{flex:0 0 40px;height:44px;border-radius:10px;border:2px dashed var(--line);background:transparent;font-size:20px;color:var(--mute);cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .add-tab:hover{border-color:var(--red);color:var(--red);}

  /* Main content */
  .main{padding:14px 14px 160px;max-width:700px;margin:0 auto;}
  .player-card{display:none;}
  .player-card.active{display:block;}

  /* Cards */
  .card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
  .card-h{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--line);}
  .card-h .ico{color:var(--red);font-size:14px;}
  .card-h h2{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--slate);}
  .card-b{padding:14px;}

  /* Form fields */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:500px){.grid2{grid-template-columns:1fr;}}
  .field{margin-bottom:12px;}
  .field:last-child{margin-bottom:0;}
  .field label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--slate);margin-bottom:5px;letter-spacing:.04em;}
  .field input,.field select,.field textarea{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:15px;font-family:inherit;background:#fff;color:var(--ink);}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(200,16,46,.1);}
  .field textarea{resize:vertical;min-height:90px;line-height:1.4;}

  /* Chips */
  .chips{display:flex;flex-wrap:wrap;gap:7px;}
  .chip{padding:9px 14px;border-radius:999px;background:#fff;font-size:14px;font-weight:600;color:var(--slate);cursor:pointer;border:1px solid var(--line);transition:.12s;}
  .chip:hover{border-color:var(--mute);}
  .chip.on{background:var(--red);color:#fff;border-color:var(--red);}

  /* Segmented control */
  .seg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .seg button{padding:12px 4px;border:1.5px solid var(--line);border-radius:10px;background:#fff;cursor:pointer;font-family:inherit;text-align:center;transition:.12s;}
  .seg button .g{font-size:18px;font-weight:800;display:block;color:var(--ink);}
  .seg button .t{font-size:10px;color:var(--mute);font-weight:600;margin-top:2px;display:block;}
  .seg button.on{border-color:var(--red);background:rgba(200,16,46,.06);}
  .seg button.on .g{color:var(--red);}

  /* Grid sections */
  .grid-section{margin-bottom:14px;}
  .grid-section:last-child{margin-bottom:0;}
  .grid-label{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--slate);margin-bottom:8px;padding:6px 10px;background:#f7f9fa;border-radius:8px;display:flex;align-items:center;gap:6px;}
  .grid-label .dot{width:8px;height:8px;border-radius:50%;}
  .grid-label .dot.with{background:var(--ok);}
  .grid-label .dot.against{background:var(--red);}

  /* Star rows */
  .srow{display:flex;align-items:center;justify-content:space-between;padding:10px 2px;border-bottom:1px solid #f1f3f5;}
  .srow:last-child{border-bottom:none;}
  .srow .nm{font-size:14px;font-weight:600;color:var(--ink);}
  .stars{display:flex;gap:3px;}
  .star{font-size:22px;line-height:1;color:var(--gold-off);cursor:pointer;transition:transform .08s;-webkit-tap-highlight-color:transparent;}
  .star:hover{transform:scale(1.1);}
  .star.lit{color:var(--gold);}

  /* Suggested grade */
  .sugg-card{display:none;}
  .sugg-top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .sugg-letter{font-size:34px;font-weight:800;width:56px;height:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;}
  .sugg-letter.A{background:rgba(200,16,46,.1);color:var(--red);}
  .sugg-letter.B{background:rgba(11,132,87,.12);color:var(--ok);}
  .sugg-letter.C{background:#eceff1;color:var(--slate);}
  .sugg-letter.D{background:#f3e8e8;color:#8a8a8a;}
  .sugg-meta{flex:1;min-width:140px;}
  .sugg-score{font-size:13px;font-weight:700;color:var(--ink);}
  .sugg-adj{font-size:11px;color:var(--mute);margin-top:2px;}
  .apply-btn{border:1px solid var(--red);background:#fff;color:var(--red);border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
  .apply-btn:hover{background:var(--red);color:#fff;}
  .sugg-flags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
  .tag{font-size:11px;font-weight:600;padding:5px 10px;border-radius:999px;}
  .tag.up{background:rgba(11,132,87,.1);color:var(--ok);}
  .tag.dn{background:rgba(200,16,46,.08);color:var(--red);}
  .confidence{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 9px;border-radius:999px;margin-left:6px;}
  .confidence.full{background:rgba(11,132,87,.12);color:var(--ok);}
  .confidence.good{background:rgba(11,132,87,.08);color:var(--ok);}
  .confidence.partial{background:#fff3cd;color:#856404;}
  .confidence.low{background:#f8d7da;color:#721c24;}

  /* Observations */
  .obs-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .obs-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--slate);}
  .mic{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 13px;font-size:13px;font-weight:600;color:var(--slate);cursor:pointer;font-family:inherit;}
  .mic .dot{width:9px;height:9px;border-radius:50%;background:var(--mute);}
  .mic.live{border-color:var(--red);color:var(--red);}
  .mic.live .dot{background:var(--red);animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* Status row */
  .status-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#f9fafb;border-radius:10px;margin-bottom:12px;}
  .status-dot{width:10px;height:10px;border-radius:50%;}
  .status-dot.draft{background:var(--gold);}
  .status-dot.saved{background:var(--ok);}
  .status-dot.empty{background:var(--line);}
  .status-text{font-size:12px;color:var(--slate);font-weight:500;}
  .auto-save{margin-left:auto;font-size:11px;color:var(--mute);}

  /* Bottom bar */
  .bottom-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:12px 14px;z-index:100;}
  .bottom-inner{max-width:700px;margin:0 auto;display:flex;gap:10px;}
  .btn{flex:1;padding:14px;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;border:none;text-align:center;}
  .btn-primary{background:var(--red);color:#fff;}
  .btn-primary:hover{background:var(--red-dk);}
  .btn-primary:disabled{background:var(--mute);cursor:not-allowed;}
  .btn-secondary{background:#fff;color:var(--slate);border:1px solid var(--line);}
  .btn-secondary:hover{background:#fafbfc;border-color:var(--mute);}

  /* Toast */
  .toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;}
  .toast.show{opacity:1;}
  .toast.ok{background:var(--ok);color:#fff;}
  .toast.err{background:#e53935;color:#fff;}

  /* Saved view */
  .saved-view{display:none;padding:14px 14px 100px;max-width:700px;margin:0 auto;}
  .search-box{margin-bottom:14px;}
  .search-box input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:15px;}
  .saved-list{display:flex;flex-direction:column;gap:8px;max-height:60vh;overflow-y:auto;}
  .saved-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1px solid var(--line);border-radius:10px;background:#fff;cursor:pointer;transition:.12s;}
  .saved-item:hover{border-color:var(--mute);background:#fafbfc;}
  .saved-item .info{flex:1;min-width:0;}
  .saved-item .name{font-size:14.5px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .saved-item .meta{font-size:12px;color:var(--mute);margin-top:2px;}
  .saved-item .grade{font-size:16px;font-weight:800;padding:4px 10px;border-radius:8px;min-width:32px;text-align:center;}
  .saved-item .grade.A{background:rgba(200,16,46,.1);color:var(--red);}
  .saved-item .grade.B{background:rgba(11,132,87,.12);color:var(--ok);}
  .saved-item .grade.C{background:#eceff1;color:var(--slate);}
  .saved-item .grade.D{background:#f3e8e8;color:#8a8a8a;}
  .saved-item .del{padding:6px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--mute);font-size:12px;font-weight:600;cursor:pointer;}
  .saved-item .del:hover{border-color:#e53935;color:#e53935;background:#fff5f5;}
  .empty-saved{padding:30px;text-align:center;color:var(--mute);font-size:14px;}
  .actions-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
  .btn-sec{border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px 16px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--slate);}
  .btn-sec:hover{border-color:var(--mute);background:#fafbfc;}
  .btn-sec.pdf{border-color:var(--red);color:var(--red);}
  .btn-sec.pdf:hover{background:var(--red);color:#fff;}
  .refresh{margin-left:auto;font-size:13px;color:var(--mute);cursor:pointer;padding:8px 12px;}
  .refresh:hover{color:var(--ink);}
  .loading{text-align:center;padding:40px;color:var(--mute);}
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="header">
  <div class="crest">RB</div>
  <div><h1>Scout Capture</h1><span>Multi-player · position-aware · synced</span></div>
</div>

<div class="view-tabs">
  <button class="view-tab on" id="viewNew">New Reports</button>
  <button class="view-tab" id="viewSaved">Saved Reports</button>
</div>

<!-- NEW REPORTS VIEW -->
<div id="newView">
  <div class="tabs-bar" id="tabsBar"></div>
  <div class="main" id="cardsContainer"></div>
  <div class="bottom-bar">
    <div class="bottom-inner">
      <button class="btn btn-secondary" id="saveThisBtn">Save This</button>
      <button class="btn btn-primary" id="saveAllBtn">Save All (0)</button>
    </div>
  </div>
</div>

<!-- SAVED REPORTS VIEW -->
<div class="saved-view" id="savedView">
  <div class="card">
    <div class="card-h">
      <span class="ico">◉</span>
      <h2>Saved Reports <span id="reportCount" style="color:var(--mute);font-weight:500;text-transform:none;"></span></h2>
      <span class="refresh" id="refreshBtn">Refresh</span>
    </div>
    <div class="card-b">
      <div class="actions-row">
        <button class="btn-sec pdf" id="exportPdf">Export PDF</button>
      </div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by name, club, position, event...">
      </div>
      <div class="saved-list" id="savedList">
        <div class="loading">Loading reports...</div>
      </div>
    </div>
  </div>
</div>

<script>
const POSITIONS = ["GK","RB","CB","LB","CDM","CM","LW","RW","ST"];
const WEAPONS = ["1v1 Attacker","1v1 Defender","Ball Carrier","Presser","Finisher","Playmaker","Aerial","Engine","Game Reader","Press Resistant","Physical","Speed","Quarterback","Channel Runner","In Behind Specialist"];

const GRIDS = {
  GK:{title:"Goalkeeper",withBall:["Distribution (feet)","Distribution (hands)","Playing out from back","Decision making"],againstBall:["Shot-stopping","1v1 saving","Commanding box","Sweeping / covering"]},
  FB:{title:"Full-back",withBall:["Attacking runs","Crossing / final ball","Carrying ball","Combination play"],againstBall:["1v1 defending","Defensive positioning","Recovery runs","Aerial duels"]},
  CB:{title:"Centre-back",withBall:["Ball-playing","Passing range","Carrying into midfield","Composure on ball"],againstBall:["1v1 defending","Aerial duels","Covering / sliding","Defensive anticipation"]},
  CDM:{title:"Holding mid (6)",withBall:["Press resistance","Passing range","Ball progression","Receiving under pressure"],againstBall:["Ball-winning","Defensive positioning","Tackling","Interceptions"]},
  CM:{title:"Central mid (8)",withBall:["Press resistance","Passing range","Final third entries","Dribbling / carrying"],againstBall:["Ball-winning","Defensive work rate","Positioning","Pressing triggers"]},
  WING:{title:"Winger",withBall:["1v1 dribbling","Final ball / crossing","Finishing","Movement off ball"],againstBall:["Defensive tracking","Pressing","Recovery runs","1v1 defending"]},
  ST:{title:"Striker",withBall:["Finishing","Movement / runs","Link-up play","1v1 / dribbling"],againstBall:["Pressing from front","Hold-up defending","Aerial contests","Work rate"]}
};
const POS_TO_GRID = {GK:"GK",RB:"FB",LB:"FB",CB:"CB",CDM:"CDM",CM:"CM",LW:"WING",RW:"WING",ST:"ST"};

const WEIGHTS = {
  GK:{withBall:{"Distribution (feet)":15,"Distribution (hands)":10,"Playing out from back":15,"Decision making":10},againstBall:{"Shot-stopping":20,"1v1 saving":12,"Commanding box":10,"Sweeping / covering":8}},
  FB:{withBall:{"Attacking runs":12,"Crossing / final ball":13,"Carrying ball":12,"Combination play":13},againstBall:{"1v1 defending":15,"Defensive positioning":13,"Recovery runs":12,"Aerial duels":10}},
  CB:{withBall:{"Ball-playing":15,"Passing range":12,"Carrying into midfield":10,"Composure on ball":13},againstBall:{"1v1 defending":15,"Aerial duels":13,"Covering / sliding":12,"Defensive anticipation":10}},
  CDM:{withBall:{"Press resistance":15,"Passing range":12,"Ball progression":13,"Receiving under pressure":10},againstBall:{"Ball-winning":15,"Defensive positioning":12,"Tackling":10,"Interceptions":13}},
  CM:{withBall:{"Press resistance":13,"Passing range":12,"Final third entries":13,"Dribbling / carrying":12},againstBall:{"Ball-winning":13,"Defensive work rate":12,"Positioning":12,"Pressing triggers":13}},
  WING:{withBall:{"1v1 dribbling":15,"Final ball / crossing":13,"Finishing":12,"Movement off ball":10},againstBall:{"Defensive tracking":13,"Pressing":15,"Recovery runs":10,"1v1 defending":12}},
  ST:{withBall:{"Finishing":18,"Movement / runs":14,"Link-up play":10,"1v1 / dribbling":8},againstBall:{"Pressing from front":18,"Hold-up defending":10,"Aerial contests":10,"Work rate":12}}
};

const DEFENSIVE_ATTRS = new Set(["Shot-stopping","1v1 saving","Commanding box","Sweeping / covering","1v1 defending","Defensive positioning","Recovery runs","Aerial duels","Covering / sliding","Defensive anticipation","Ball-winning","Tackling","Interceptions","Defensive work rate","Positioning","Pressing triggers","Defensive tracking","Pressing","Pressing from front","Hold-up defending","Aerial contests","Work rate"]);

// State
let players = [];
let activePlayerId = null;
let nextId = 1;
let allReports = [];

function createPlayer(jersey = '') {
  return {
    id: nextId++,
    dbId: null,
    jersey: jersey,
    name: '',
    club: '',
    yob: '',
    foot: '',
    phys: '',
    event: '',
    date: new Date().toISOString().split('T')[0],
    pos: null,
    overall: null,
    press: 0,
    grid: {},
    weapons: new Set(),
    notes: '',
    saved: false,
    hasData: false
  };
}

function showToast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 2500);
}

function updateHasData(player) {
  player.hasData = !!(player.jersey || player.name || player.pos || player.overall || player.notes || Object.values(player.grid).some(v => v > 0) || player.weapons.size > 0);
}

function countWithData() {
  return players.filter(p => p.hasData && !p.saved).length;
}

// View switching
document.getElementById('viewNew').onclick = () => {
  document.getElementById('viewNew').classList.add('on');
  document.getElementById('viewSaved').classList.remove('on');
  document.getElementById('newView').style.display = 'block';
  document.getElementById('savedView').style.display = 'none';
};
document.getElementById('viewSaved').onclick = () => {
  document.getElementById('viewSaved').classList.add('on');
  document.getElementById('viewNew').classList.remove('on');
  document.getElementById('savedView').style.display = 'block';
  document.getElementById('newView').style.display = 'none';
  loadReports();
};

function renderTabs() {
  const bar = document.getElementById('tabsBar');
  bar.innerHTML = '';
  players.forEach(p => {
    const tab = document.createElement('div');
    tab.className = 'player-tab' + (p.id === activePlayerId ? ' active' : '');
    tab.dataset.id = p.id;
    let badgeClass = 'empty';
    if (p.saved) badgeClass = 'saved';
    else if (p.hasData) badgeClass = '';
    tab.innerHTML = `
      <div class="jersey">${p.jersey || '?'}</div>
      <div class="info"><div class="pos">${p.pos || '—'}</div><div class="tname">${p.name || 'New player'}</div></div>
      <div class="badge ${badgeClass}"></div>
      <button class="del-btn" data-id="${p.id}">×</button>
    `;
    tab.onclick = (e) => { if (e.target.classList.contains('del-btn')) return; activePlayerId = p.id; renderAll(); };
    tab.querySelector('.del-btn').onclick = (e) => { e.stopPropagation(); deletePlayer(p.id); };
    bar.appendChild(tab);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'add-tab';
  addBtn.textContent = '+';
  addBtn.onclick = () => { const np = createPlayer(); players.push(np); activePlayerId = np.id; renderAll(); };
  bar.appendChild(addBtn);
  const count = countWithData();
  document.getElementById('saveAllBtn').textContent = `Save All (${count})`;
  document.getElementById('saveAllBtn').disabled = count === 0;
}

function deletePlayer(id) {
  if (players.length === 1) { showToast('Need at least one player', 'err'); return; }
  players = players.filter(p => p.id !== id);
  if (activePlayerId === id) activePlayerId = players[0].id;
  renderAll();
  showToast('Player removed');
}

function renderCards() {
  const container = document.getElementById('cardsContainer');
  container.innerHTML = '';
  players.forEach(p => {
    const card = document.createElement('div');
    card.className = 'player-card' + (p.id === activePlayerId ? ' active' : '');
    card.dataset.id = p.id;
    card.innerHTML = buildCardHTML(p);
    container.appendChild(card);
  });
  bindCardEvents();
}

function buildCardHTML(p) {

  else if (p.hasData) { statusClass = 'draft'; statusText = 'Draft — unsaved'; }

  return `
    <div class="status-row">
      <div class="status-dot ${statusClass}"></div>
      <span class="status-text">${statusText}</span>
      <span class="auto-save">${p.saved ? '✓ Synced' : ''}</span>
    </div>
    <div class="card">
      <div class="card-h"><span class="ico">●</span><h2>Player Info</h2></div>
      <div class="card-b">
        <div class="grid2">
          <div class="field"><label>Player Name</label><input type="text" data-field="name" value="${p.name}" placeholder="e.g., Mamoudou Diakite"></div>
          <div class="field"><label>Club</label><input type="text" data-field="club" value="${p.club}" placeholder="e.g., Penn Fusion"></div>
          <div class="field"><label>Jersey #</label><input type="number" data-field="jersey" value="${p.jersey}" placeholder="#"></div>
          <div class="field"><label>Year of Birth</label><input type="number" data-field="yob" value="${p.yob}" placeholder="2012"></div>
          <div class="field"><label>Foot</label><select data-field="foot"><option value="">Select…</option><option ${p.foot==='Right'?'selected':''}>Right</option><option ${p.foot==='Left'?'selected':''}>Left</option><option ${p.foot==='Both'?'selected':''}>Both</option></select></div>
          <div class="field"><label>Physical Profile</label><select data-field="phys"><option value="">Select…</option><option ${p.phys==='Early developer'?'selected':''}>Early developer</option><option ${p.phys==='On age'?'selected':''}>On age</option><option ${p.phys==='Undersized / late developer'?'selected':''}>Undersized / late developer</option></select></div>
          <div class="field"><label>Event</label><input type="text" data-field="event" value="${p.event}" placeholder="e.g., ECNL Playoffs"></div>
          <div class="field"><label>Date</label><input type="date" data-field="date" value="${p.date}"></div>
        </div>
        <div class="field" style="margin-top:14px;"><label>Primary Position</label><div class="chips pos-chips">${POSITIONS.map(pos => `<div class="chip ${p.pos===pos?'on':''}" data-pos="${pos}">${pos}</div>`).join('')}</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-h"><span class="ico">★</span><h2>Every Player</h2></div>
      <div class="card-b">
        <div class="field"><label>Overall — the routing call</label>
          <div class="seg overall-seg">
            <button data-g="A" class="${p.overall==='A'?'on':''}"><span class="g">A</span><span class="t">Priority</span></button>
            <button data-g="B" class="${p.overall==='B'?'on':''}"><span class="g">B</span><span class="t">Monitor</span></button>
            <button data-g="C" class="${p.overall==='C'?'on':''}"><span class="g">C</span><span class="t">Database</span></button>
            <button data-g="D" class="${p.overall==='D'?'on':''}"><span class="g">D</span><span class="t">Pass</span></button>
          </div>
        </div>
        <div class="field" style="margin-top:14px;"><label>Pressing / Work-rate (RB DNA)</label>
          <div class="srow" style="border:none;padding:8px 0;"><span class="nm">Pressing intensity</span><div class="stars press-stars">${[1,2,3,4,5].map(i => `<span class="star ${p.press>=i?'lit':''}" data-val="${i}">★</span>`).join('')}</div></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-h"><span class="ico">▥</span><h2>${gridData ? gridData.title + ' — Grid' : 'Position Grid'}</h2></div>
      <div class="card-b grid-body">${gridData ? buildGridHTML(p, gridData) : '<div style="text-align:center;padding:20px;color:var(--mute);">Select a position above to load the grid.</div>'}</div>
    </div>
    <div class="card sugg-card" data-player="${p.id}">${buildSuggestedGradeHTML(p)}</div>
    <div class="card">
      <div class="card-h"><span class="ico">✦</span><h2>Special Weapons</h2></div>
      <div class="card-b"><p style="font-size:12px;color:var(--mute);margin-bottom:10px;">Identifying traits — select any</p><div class="chips weapon-chips">${WEAPONS.map(w => `<div class="chip ${p.weapons.has(w)?'on':''}" data-weapon="${w}">${w}</div>`).join('')}</div></div>
    </div>
    <div class="card">
      <div class="card-h"><span class="ico">✎</span><h2>Observations</h2></div>
      <div class="card-b">
        <div class="obs-row">
          <label class="obs-label">Shorthand Notes</label>
          <button class="mic" data-player="${p.id}"><span class="dot"></span><span class="mic-txt">Speak</span></button>
        </div>
        <div class="field" style="margin:0;">
          <textarea data-field="notes" placeholder="1v1 defending, positioning, work rate, pressing...">${p.notes}</textarea>

function buildGridHTML(p, gridData) {
  let html = '<div class="grid-section"><div class="grid-label"><span class="dot with"></span>With Ball</div>';
  gridData.withBall.forEach(attr => {
    const val = p.grid[attr] || 0;
    html += `<div class="srow"><span class="nm">${attr}</span><div class="stars grid-stars" data-attr="${attr}">${[1,2,3,4,5].map(i => `<span class="star ${val>=i?'lit':''}" data-val="${i}">★</span>`).join('')}</div></div>`;
  });
  html += '</div><div class="grid-section"><div class="grid-label"><span class="dot against"></span>Against Ball</div>';
  gridData.againstBall.forEach(attr => {
    const val = p.grid[attr] || 0;
    html += `<div class="srow"><span class="nm">${attr}</span><div class="stars grid-stars" data-attr="${attr}">${[1,2,3,4,5].map(i => `<span class="star ${val>=i?'lit':''}" data-val="${i}">★</span>`).join('')}</div></div>`;
  });
  html += '</div>';
  return html;
}

function buildSuggestedGradeHTML(p) {
  if (!p.pos) return '';
  const gridKey = POS_TO_GRID[p.pos];
  const gridData = GRIDS[gridKey];
  const w = WEIGHTS[gridKey];
  const allWeights = {...w.withBall, ...w.againstBall};
  const allAttrs = [...gridData.withBall, ...gridData.againstBall];
  const rated = allAttrs.filter(a => (p.grid[a] || 0) > 0);
  if (rated.length === 0) return '';

  let pressMultiplier = 1.0;
  if (p.press >= 4) pressMultiplier = 1.15;
  if (p.press === 5) pressMultiplier = 1.25;

  let sum = 0, wsum = 0;
  rated.forEach(a => {
    let weight = allWeights[a];
    if (DEFENSIVE_ATTRS.has(a) && p.press > 0) weight *= pressMultiplier;
    sum += p.grid[a] * weight;
    wsum += weight;
  });
  const base = sum / wsum;

  const top2 = [...rated].sort((a,b) => allWeights[b] - allWeights[a]).slice(0,2);
  let wb = 0; if (top2.some(a => p.grid[a] === 5)) wb = 0.3; else if (rated.some(a => p.grid[a] === 5)) wb = 0.15;
  let hp = 0; if (top2.some(a => p.grid[a] === 1)) hp = 0.4; else if (rated.some(a => p.grid[a] === 1)) hp = 0.3;

  const score = Math.max(0, Math.min(5, base + wb - hp));
  let letter = score >= 3.8 ? 'A' : score >= 2.8 ? 'B' : score >= 2.0 ? 'C' : 'D';
  const thin = rated.length < 3;
  if (thin && letter === 'A') letter = 'B';

  let confidence, confClass;
  if (rated.length >= 7) { confidence = 'Full picture'; confClass = 'full'; }
  else if (rated.length >= 5) { confidence = 'Good sample'; confClass = 'good'; }
  else if (rated.length >= 3) { confidence = 'Partial view'; confClass = 'partial'; }
  else { confidence = 'Limited data'; confClass = 'low'; }

  return `
    <div class="card-h"><span class="ico">⚖</span><h2>Suggested Grade</h2></div>
    <div class="card-b">
      <div class="sugg-top">
        <div class="sugg-letter ${thin ? '' : letter}">${thin ? '?' : letter}</div>
        <div class="sugg-meta">
          <div class="sugg-score">Weighted ${base.toFixed(1)} · adjusted ${score.toFixed(1)}/5 · ${rated.length}/8 seen <span class="confidence ${confClass}">${confidence}</span></div>
          <div class="sugg-adj">${thin ? 'Need more observations' : ''}</div>
        </div>
        <button class="apply-btn" data-grade="${letter}">Apply</button>
      </div>
      <div class="sugg-flags">
        ${rated.filter(a => p.grid[a] === 5).map(a => `<span class="tag up">Elite · ${a}</span>`).join('')}
        ${rated.filter(a => p.grid[a] === 1).map(a => `<span class="tag dn">Concern · ${a}</span>`).join('')}
      </div>
    </div>
  `;
}

function bindCardEvents() {
  const activeCard = document.querySelector('.player-card.active');
  if (!activeCard) return;
  const player = players.find(p => p.id === activePlayerId);
  if (!player) return;

  activeCard.querySelectorAll('input[data-field], select[data-field], textarea[data-field]').forEach(el => {
    el.oninput = el.onchange = () => { player[el.dataset.field] = el.value; player.saved = false; updateHasData(player); renderTabs(); };
  });

  activeCard.querySelectorAll('.pos-chips .chip').forEach(chip => {
    chip.onclick = () => {
      activeCard.querySelectorAll('.pos-chips .chip').forEach(c => c.classList.remove('on'));
      chip.classList.add('on');
      player.pos = chip.dataset.pos;
      player.grid = {};
      player.saved = false;
      updateHasData(player);
      renderAll();
    };
  });

  activeCard.querySelectorAll('.overall-seg button').forEach(btn => {
    btn.onclick = () => {
      activeCard.querySelectorAll('.overall-seg button').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      player.overall = btn.dataset.g;
      player.saved = false;
      updateHasData(player);
      renderTabs();
    };
  });

  activeCard.querySelectorAll('.press-stars .star').forEach(star => {
    star.onclick = () => {
      const val = parseInt(star.dataset.val);
      player.press = player.press === val ? 0 : val;
      player.saved = false;
      updateHasData(player);
      renderAll();
    };
  });

  activeCard.querySelectorAll('.grid-stars').forEach(sc => {
    const attr = sc.dataset.attr;
    sc.querySelectorAll('.star').forEach(star => {
      star.onclick = () => {
        const val = parseInt(star.dataset.val);
        player.grid[attr] = player.grid[attr] === val ? 0 : val;
        player.saved = false;
        updateHasData(player);
        renderAll();
      };
    });
  });

  activeCard.querySelectorAll('.weapon-chips .chip').forEach(chip => {
    chip.onclick = () => {
      const w = chip.dataset.weapon;
      if (player.weapons.has(w)) { player.weapons.delete(w); chip.classList.remove('on'); }
      else { player.weapons.add(w); chip.classList.add('on'); }
      player.saved = false;
      updateHasData(player);
      renderTabs();
    };
  });

  const applyBtn = activeCard.querySelector('.apply-btn');
  if (applyBtn) {
    applyBtn.onclick = () => {
      player.overall = applyBtn.dataset.grade;
      player.saved = false;
      updateHasData(player);
      renderAll();
    };
  }

  // Voice
  const mic = activeCard.querySelector('.mic');
  if (mic) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
      mic.onclick = () => {
        if (mic.classList.contains('live')) { mic.rec && mic.rec.stop(); return; }
        const rec = new SR(); rec.lang = 'en-US'; rec.interimResults = true; rec.continuous = true;
        const ta = activeCard.querySelector('textarea[data-field="notes"]');
        let base = ta.value;
        rec.onstart = () => { mic.classList.add('live'); mic.querySelector('.mic-txt').textContent = 'Stop'; };
        rec.onerror = rec.onend = () => { mic.classList.remove('live'); mic.querySelector('.mic-txt').textContent = 'Speak'; };
        rec.onresult = (e) => { let t = ''; for (let i = 0; i < e.results.length; i++) t += e.results[i][0].transcript; ta.value = (base ? base + ' ' : '') + t; player.notes = ta.value; player.saved = false; updateHasData(player); renderTabs(); };
        mic.rec = rec;
        try { rec.start(); } catch(err) {}
      };
    }
  }

  // Show/hide suggested grade card
  const suggCard = activeCard.querySelector('.sugg-card');
  if (suggCard) {
    const hasRatings = Object.values(player.grid).some(v => v > 0);
    suggCard.style.display = hasRatings ? 'block' : 'none';
  }
}

function renderAll() { renderTabs(); renderCards(); }

// API functions
async function savePlayer(player) {
  const data = {
    name: player.name, club: player.club, jersey: player.jersey, yob: player.yob,
    foot: player.foot, phys: player.phys, event: player.event, date: player.date || null,
    pos: player.pos, overall: player.overall, press: player.press,
    grid: player.grid, weapons: [...player.weapons], notes: player.notes
  };
  try {
    let res;
    if (player.dbId) {
      res = await fetch('/api/update?id=' + player.dbId, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
    } else {
      res = await fetch('/api/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
    }
    const result = await res.json();
    if (result.error) throw new Error(result.error);
    if (result.report && result.report[0]) player.dbId = result.report[0].id;
    player.saved = true;
    return true;
  } catch(e) {
    showToast('Save failed: ' + e.message, 'err');
    return false;
  }
}

document.getElementById('saveThisBtn').onclick = async () => {
  const player = players.find(p => p.id === activePlayerId);
  if (!player || !player.hasData) { showToast('No data to save', 'err'); return; }
  document.getElementById('saveThisBtn').disabled = true;
  document.getElementById('saveThisBtn').textContent = 'Saving...';
  const ok = await savePlayer(player);
  document.getElementById('saveThisBtn').disabled = false;
  document.getElementById('saveThisBtn').textContent = 'Save This';
  if (ok) { showToast('Player saved!'); renderAll(); }
};

document.getElementById('saveAllBtn').onclick = async () => {
  const toSave = players.filter(p => p.hasData && !p.saved);
  if (toSave.length === 0) { showToast('All players already saved'); return; }
  document.getElementById('saveAllBtn').disabled = true;
  document.getElementById('saveAllBtn').textContent = 'Saving...';
  let saved = 0;
  for (const p of toSave) { if (await savePlayer(p)) saved++; }
  document.getElementById('saveAllBtn').textContent = `Save All (${countWithData()})`;
  document.getElementById('saveAllBtn').disabled = countWithData() === 0;
  showToast(`Saved ${saved} player${saved !== 1 ? 's' : ''}!`);
  renderAll();
};

// Saved reports
async function loadReports() {
  const list = document.getElementById('savedList');
  list.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const res = await fetch('/api/reports');
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    allReports = data.reports || [];
    renderSavedList();
  } catch(e) {
    list.innerHTML = '<div class="empty-saved">Error: ' + e.message + '</div>';
  }
}

function renderSavedList() {
  const list = document.getElementById('savedList');
  const search = document.getElementById('searchInput').value.toLowerCase();
  document.getElementById('reportCount').textContent = allReports.length ? `(${allReports.length})` : '';
  const filtered = allReports.filter(r => [r.name, r.club, r.pos, r.event, r.overall].filter(Boolean).join(' ').toLowerCase().includes(search));
  if (filtered.length === 0) { list.innerHTML = '<div class="empty-saved">' + (search ? 'No matches' : 'No reports yet') + '</div>'; return; }
  list.innerHTML = filtered.map(r => `
    <div class="saved-item" data-id="${r.id}">
      <div class="info"><div class="name">${r.name || 'Unknown'}</div><div class="meta">${[r.club, r.pos, r.event].filter(Boolean).join(' · ') || 'No details'}</div></div>
      ${r.overall ? `<div class="grade ${r.overall}">${r.overall}</div>` : ''}
      <button class="del" data-id="${r.id}">Delete</button>
    </div>
  `).join('');
  list.querySelectorAll('.saved-item').forEach(item => {
    item.onclick = (e) => { if (e.target.classList.contains('del')) return; loadReportIntoNewTab(allReports.find(x => x.id == item.dataset.id)); };
  });
  list.querySelectorAll('.del').forEach(btn => {
    btn.onclick = (e) => { e.stopPropagation(); deleteReport(btn.dataset.id); };
  });
}

function loadReportIntoNewTab(r) {
  const p = createPlayer();
  p.dbId = r.id;
  p.name = r.name || '';
  p.club = r.club || '';
  p.jersey = r.jersey || '';
  p.yob = r.yob || '';
  p.foot = r.foot || '';
  p.phys = r.phys || '';
  p.event = r.event || '';
  p.date = r.date || '';
  p.pos = r.pos;
  p.overall = r.overall;
  p.press = r.press || 0;
  p.grid = typeof r.grid === 'string' ? JSON.parse(r.grid) : (r.grid || {});
  p.weapons = new Set(typeof r.weapons === 'string' ? JSON.parse(r.weapons) : (r.weapons || []));
  p.notes = r.notes || '';
  p.saved = true;
  updateHasData(p);
  players.push(p);
  activePlayerId = p.id;
  document.getElementById('viewNew').click();
  renderAll();
  showToast('Loaded into new tab');
}

async function deleteReport(id) {
  if (!confirm('Delete this report?')) return;
  try {
    const res = await fetch('/api/delete?id=' + id, { method: 'DELETE' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    showToast('Report deleted');
    loadReports();
  } catch(e) {
    showToast('Delete failed: ' + e.message, 'err');
  }
}

document.getElementById('refreshBtn').onclick = loadReports;
document.getElementById('searchInput').oninput = renderSavedList;

// PDF Export
const ss = n => "★".repeat(n) + "☆".repeat(5-n);
document.getElementById('exportPdf').onclick = () => {
  if (allReports.length === 0) { showToast('No reports to export', 'err'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const pageWidth = doc.internal.pageSize.getWidth();
  const margin = 15, lineHeight = 6;
  let y = 20;
  doc.setFontSize(18); doc.setFont(undefined, 'bold'); doc.setTextColor(200, 16, 46);
  doc.text('Scout Reports – NY Red Bulls', margin, y); y += 10;
  doc.setFontSize(10); doc.setTextColor(100); doc.setFont(undefined, 'normal');
  doc.text(`Exported: ${new Date().toLocaleDateString()} | ${allReports.length} players`, margin, y); y += 12;
  allReports.forEach(r => {
    if (y > 250) { doc.addPage(); y = 20; }
    doc.setFillColor(200, 16, 46);
    doc.rect(margin, y - 5, pageWidth - margin * 2, 10, 'F');
    doc.setTextColor(255); doc.setFontSize(12); doc.setFont(undefined, 'bold');
    doc.text(`${r.name || 'Unknown'} ${r.pos ? '— ' + r.pos : ''} ${r.overall ? '[' + r.overall + ']' : ''}`, margin + 3, y + 2); y += 12;
    doc.setTextColor(50); doc.setFontSize(10); doc.setFont(undefined, 'normal');
    const details = [r.club, r.yob, r.jersey ? '#' + r.jersey : '', r.foot].filter(Boolean).join(' · ');
    if (details) { doc.text(details, margin, y); y += lineHeight; }
    const grid = typeof r.grid === 'string' ? JSON.parse(r.grid || '{}') : (r.grid || {});
    Object.entries(grid).forEach(([attr, val]) => {
      if (y > 270) { doc.addPage(); y = 20; }
      doc.text(`  ${attr}: ${val > 0 ? ss(val) : '—'}`, margin, y); y += lineHeight - 1;
    });
    if (r.notes) {
      y += 2;
      doc.splitTextToSize('Notes: ' + r.notes, pageWidth - margin * 2).forEach(line => {
        if (y > 270) { doc.addPage(); y = 20; }
        doc.text(line, margin, y); y += lineHeight - 1;
      });
    }
    y += 8;
  });
  doc.save(`scout-reports-${new Date().toISOString().split('T')[0]}.pdf`);
  showToast('PDF exported');
};

// Init
players.push(createPlayer());
activePlayerId = players[0].id;
renderAll();
</script>
